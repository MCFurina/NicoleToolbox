name: Build & Release

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & Build
        run: |
          dotnet restore
          dotnet publish -c Release -o publish

      - name: Zip output
        run: Compress-Archive -Path publish/* -DestinationPath NicoleToolbox-Dev.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: NicoleToolbox-Dev.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: AutoBuildAndRelease

permissions:
  contents: write
  
on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish NicoleToolbox.csproj -c Release -o publish -a x64 --no-self-contained /m

      - name: Zip
        run: |
          $zipName = "NicoleToolbox-${{ github.run_number }}.zip"
          Compress-Archive -Path publish/* -DestinationPath $zipName

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Dev Release #${{ github.run_number }}"
          tag_name: dev-${{ github.run_number }}
          files: NicoleToolbox-${{ github.run_number }}.zip
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
